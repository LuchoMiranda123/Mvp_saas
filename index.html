<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency OS - Sistema Operativo para Agencias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/custom.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
                        brand: '#0f172a'
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased overflow-hidden h-screen flex bg-slate-50 text-slate-900 font-sans">
    <div id="app" class="w-full h-full flex flex-col"></div>
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4" onclick="UI.closeModal()">
        <div id="modal-content" class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[85vh] overflow-y-auto" onclick="event.stopPropagation()"></div>
    </div>
    <div id="drawer-overlay" class="fixed inset-0 bg-black/30 z-40 hidden" onclick="UI.closeDrawer()">
        <div id="drawer-content" class="absolute right-0 top-0 h-full w-full max-w-lg bg-white shadow-2xl overflow-y-auto" onclick="event.stopPropagation()"></div>
    </div>
    <div id="toast-container" class="fixed bottom-6 right-6 z-[60] space-y-2"></div>
    <script src="js/data.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script>
    <script src="js/router.js"></script>
    <script src="js/views/login.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/workspace.js"></script>
    <script src="js/views/summary.js"></script>
    <script src="js/views/onboarding.js"></script>
    <script src="js/views/brief.js"></script>
    <script src="js/views/meetings.js"></script>
    <script src="js/views/files.js"></script>
    <script src="js/views/benchmark.js"></script>
    <script src="js/views/strategy.js"></script>
    <script src="js/views/content.js"></script>
    <script src="js/views/operations.js"></script>
    <script src="js/views/reports.js"></script>
    <script src="js/views/settings.js"></script>
    <script src="js/views/agents.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
